idea:
  title: Naturalistic Induction Heads
  domain: machine_learning
  hypothesis: 'Induction heads identified in prior work were discovered using random
    data. There may exist induction heads, or similar mechanisms, that only function
    on data resembling the model''s training distribution.

    '
  background:
    description: "Elhage et al. 2021 and Olsson et al. 2021 famously discovered and\
      \ described induction heads. I've seen surprisingly little about them since.\
      \ One thing I've always wondered\u2014they found induction heads through copying\
      \ on random data. Are there induction heads (or something like them) that only\
      \ work on data that looks more like the training set?\n"
  metadata:
    author: Ari Holtzman
    source: IdeaHub
